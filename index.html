<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Interno | Lubricenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Inter', sans-serif; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .glass-card:hover { border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    
    <header class="max-w-6xl mx-auto mb-10 flex justify-between items-end border-b border-white/10 pb-4">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter">LUBRICENTER<span class="text-blue-500">.</span></h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Inventario Interno</p>
        </div>
        <div id="fecha-actualizacion" class="text-[10px] text-gray-400 font-mono text-right">
            Cargando datos...
        </div>
    </header>

    <main id="grid-productos" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        </main>

    <script>
        async function cargarDatos() {
            try {
                // Leemos el archivo JSON
                const respuesta = await fetch('datos.json');
                const data = await respuesta.json();
                
                // Actualizamos la fecha
                document.getElementById('fecha-actualizacion').innerText = "Actualizado: " + (data.actualizado || 'Recientemente');
                
                // Inyectamos los productos
                const contenedor = document.getElementById('grid-productos');
                contenedor.innerHTML = data.productos.map(p => `
                    <div class="glass-card rounded-xl overflow-hidden transition-all duration-300">
                        <div class="h-40 bg-black/50 relative">
                            <img src="${p.imagen}" alt="${p.nombre}" class="w-full h-full object-cover opacity-80" onerror="this.src='https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=400&auto=format&fit=crop'">
                            <span class="absolute top-2 right-2 bg-black/80 text-white text-[9px] px-2 py-1 rounded font-bold uppercase tracking-wider border border-white/10">${p.categoria}</span>
                        </div>
                        <div class="p-4">
                            <h2 class="text-sm font-bold leading-tight mb-2 h-10 overflow-hidden">${p.nombre}</h2>
                            <p class="text-[10px] text-gray-500 mb-4 h-8 overflow-hidden">${p.descripcion}</p>
                            
                            <div class="flex justify-between items-end pt-3 border-t border-white/10">
                                <div>
                                    <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Precio Bs</p>
                                    <p class="text-lg font-black text-white">Bs. ${p.precio_bs.toLocaleString('es-VE')}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Ref USD</p>
                                    <p class="text-sm font-bold text-blue-400">$${p.precio_usd}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('grid-productos').innerHTML = '<p class="text-red-500 text-sm">Error cargando el inventario. Esperando sincronización con n8n...</p>';
            }
        }

        cargarDatos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Lubricenter</title>
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(255, 93, 21, 0.5); transform: translateY(-3px); }
        
        /* Ocultar barra de scroll en los filtros horizontales */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Píldora de filtro activa */
        .filtro-btn.activo { background-color: #FF5D15; color: white; border-color: #FF5D15; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen pb-20">
    
    <header class="sticky top-0 z-50 bg-[#0a0a0a]/95 backdrop-blur-md border-b border-white/5 p-4 md:p-6">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo LC" class="h-10 w-auto object-contain" onerror="this.style.display='none'">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter">LUBRICENTER<span class="text-[#FF5D15]">.</span></h1>
                    <p class="text-[11px] text-[#FF5D15] font-bold uppercase tracking-widest -mt-1">Cuidamos lo que te mueve</p>
                </div>
            </div>
        </div>
    </header>

    <div class="p-4 md:px-6 max-w-7xl mx-auto mt-2">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 border-b border-white/5 pb-4">
            <p class="text-xs text-gray-500 uppercase tracking-widest font-bold">Catálogo Digital</p>
            <div class="flex items-center gap-4 text-gray-400 text-xs font-mono">
                <a href="https://www.instagram.com/lubricentercabudare/" target="_blank" class="flex items-center gap-1 hover:text-[#FF5D15] transition-colors">@lubricentercabudare</a>
                <a href="https://wa.me/584147934291?text=%C2%A1Hola!%20Buen%20d%C3%ADa.%20Me%20gustar%C3%ADa%20hacerles%20una%20consulta." target="_blank" class="flex items-center gap-1 hover:text-[#FF5D15] transition-colors">04147934291</a>
            </div>
        </div>
    </div>

    <section class="max-w-7xl mx-auto p-4 md:px-6 pt-2 sticky top-[72px] md:top-[88px] z-40 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-white/5 pb-4">
        
        <div class="flex gap-2 overflow-x-auto hide-scroll pb-2 mb-3" id="filtro-tipo">
            <button class="filtro-btn activo border border-white/20 text-gray-400 px-4 py-1.5 rounded-full text-xs uppercase tracking-wider whitespace-nowrap transition-colors" data-tipo="todos">Todos</button>
            <button class="filtro-btn border border-white/20 text-gray-400 px-4 py-1.5 rounded-full text-xs uppercase tracking-wider whitespace-nowrap transition-colors" data-tipo="sintetico">Sintético</button>
            <button class="filtro-btn border border-white/20 text-gray-400 px-4 py-1.5 rounded-full text-xs uppercase tracking-wider whitespace-nowrap transition-colors" data-tipo="semi">Semi</button>
            <button class="filtro-btn border border-white/20 text-gray-400 px-4 py-1.5 rounded-full text-xs uppercase tracking-wider whitespace-nowrap transition-colors" data-tipo="mineral">Mineral</button>
            <button class="filtro-btn border border-white/20 text-gray-400 px-4 py-1.5 rounded-full text-xs uppercase tracking-wider whitespace-nowrap transition-colors" data-tipo="hidraulico">Hidráulico</button>
            <button class="filtro-btn border border-white/20 text-gray-400 px-4 py-1.5 rounded-full text-xs uppercase tracking-wider whitespace-nowrap transition-colors" data-tipo="valvulina">Valvulina</button>
        </div>

        <div class="flex gap-3">
            <select id="filtro-grosor" class="bg-[#1a1a1a] text-white border border-white/10 rounded-lg px-3 py-2 text-xs w-full focus:outline-none focus:border-[#FF5D15]">
                <option value="todos">Cualquier Grosor</option>
                <option value="0w20">0W-20</option>
                <option value="5w20">5W-20</option>
                <option value="5w30">5W-30</option>
                <option value="5w40">5W-40</option>
                <option value="10w30">10W-30</option>
                <option value="15w40">15W-40</option>
                <option value="20w50">20W-50</option>
                <option value="25w60">25W-60</option>
            </select>

            <select id="filtro-precio" class="bg-[#1a1a1a] text-white border border-white/10 rounded-lg px-3 py-2 text-xs w-full focus:outline-none focus:border-[#FF5D15]">
                <option value="defecto">Relevancia</option>
                <option value="menor">Precio: Menor a Mayor</option>
                <option value="mayor">Precio: Mayor a Menor</option>
            </select>
        </div>
    </section>

    <main id="grid-productos" class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
        <p class="text-gray-600 text-sm col-span-full text-center py-10">Cargando inventario de aceites...</p>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-[#0a0a0a] border-t border-white/5 p-3 md:hidden">
        <div class="flex items-center justify-around text-gray-500">
            <button class="flex flex-col items-center gap-1 text-[#FF5D15]">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wider">Catálogo</span>
            </button>
        </div>
    </nav>

    <script>
        let inventarioGlobal = []; 

        async function cargarDatos() {
            try {
                // TRUCO DE CACHÉ: Le añade un sello de tiempo único a la consulta
                const timestamp = new Date().getTime();
                const respuesta = await fetch(`datos.json?v=${timestamp}`);
                
                const data = await respuesta.json();
                inventarioGlobal = data.productos;
                renderizarProductos(inventarioGlobal); 
            } catch (error) {
                document.getElementById('grid-productos').innerHTML = '<p class="text-[#FF5D15] text-sm col-span-full text-center py-10">Error cargando el inventario. Esperando datos de sincronización...</p>';
            }
        }

        function renderizarProductos(productos) {
            const contenedor = document.getElementById('grid-productos');
            contenedor.innerHTML = '';
            
            if(productos.length === 0) {
                contenedor.innerHTML = '<p class="text-gray-500 text-sm col-span-full text-center py-10">No se encontraron productos con estos filtros.</p>';
                return;
            }

            productos.forEach(p => {
                // MENSAJE DE WHATSAPP MÁS HUMANO
                const mensajeWa = `¡Hola! Buen día. Vi este producto en el catálogo y me interesa: ${p.nombre}. ¿Me confirman si tienen disponibilidad?`;
                const linkWhatsApp = `https://wa.me/584147934291?text=${encodeURIComponent(mensajeWa)}`;
                
                const tarjetaHTML = `
                <div class="glass-card rounded-2xl overflow-hidden flex flex-col p-4">
                    <div class="h-40 bg-black/80 relative rounded-xl overflow-hidden mb-4 border border-white/5">
                        <img src="${p.imagen}" alt="${p.nombre}" class="w-full h-full object-cover opacity-70" onerror="this.src='https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=400&auto=format&fit=crop'">
                        <span class="absolute top-2 right-2 bg-[#FF5D15] text-white text-[9px] px-2 py-1 rounded-md font-bold uppercase tracking-wider">${p.categoria}</span>
                    </div>
                    <div class="flex-grow flex flex-col">
                        <h2 class="text-sm font-bold leading-snug text-[#f5f5f5] mb-2 h-10 overflow-hidden line-clamp-2">${p.nombre}</h2>
                        
                        <div class="flex justify-between items-end pt-3 border-t border-white/5 mb-4 mt-auto">
                            <div>
                                <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Bs.</p>
                                <p class="text-lg font-black text-white">${p.precio_bs.toLocaleString('es-VE')}</p>
                            </div>
                            <div class="text-right bg-[#FF5D15]/10 px-2 py-1 rounded border border-[#FF5D15]/20">
                                <p class="text-[8px] text-[#FF5D15] uppercase tracking-wider font-bold mb-0.5">Ref USD</p>
                                <p class="text-sm font-black text-[#FF5D15]">${p.precio_usd_bcv}</p>
                            </div>
                        </div>
                        
                        <a href="${linkWhatsApp}" target="_blank" class="w-full bg-white/5 hover:bg-[#FF5D15] border border-white/10 hover:border-[#FF5D15] text-white transition-colors py-2.5 rounded-lg text-center text-[10px] font-bold uppercase tracking-wider flex items-center justify-center gap-2">
                            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                            Comprar
                        </a>
                    </div>
                </div>
                `;
                contenedor.insertAdjacentHTML('beforeend', tarjetaHTML);
            });
        }

        // LÓGICA DE FILTRADO INTELIGENTE
        function aplicarFiltros() {
            let filtrados = inventarioGlobal;
            
            const tipoActivo = document.querySelector('.filtro-btn.activo').dataset.tipo;
            const grosorActivo = document.getElementById('filtro-grosor').value;
            const precioOrden = document.getElementById('filtro-precio').value;

            if (tipoActivo !== 'todos') {
                filtrados = filtrados.filter(p => {
                    const str = (p.nombre + " " + p.categoria).toUpperCase();
                    if (tipoActivo === 'sintetico') return str.includes('SINTETICO') && !str.includes('SEMI');
                    if (tipoActivo === 'semi') return str.includes('SEMI');
                    if (tipoActivo === 'mineral') return str.includes('MINERAL');
                    if (tipoActivo === 'hidraulico') return str.includes('HIDRAULICO') || str.includes('DEX');
                    if (tipoActivo === 'valvulina') return str.includes('VALVULINA');
                    return true;
                });
            }

            if (grosorActivo !== 'todos') {
                filtrados = filtrados.filter(p => {
                    const strLimpio = (p.nombre + " " + p.categoria).toUpperCase().replace(/[-\s]/g, '');
                    const targetLimpio = grosorActivo.toUpperCase();
                    return strLimpio.includes(targetLimpio);
                });
            }

            if (precioOrden !== 'defecto') {
                filtrados.sort((a, b) => {
                    const precioA = parseFloat(a.precio_usd_bcv.replace(/[^0-9.-]+/g,""));
                    const precioB = parseFloat(b.precio_usd_bcv.replace(/[^0-9.-]+/g,""));
                    return precioOrden === 'menor' ? precioA - precioB : precioB - precioA;
                });
            }

            renderizarProductos(filtrados);
        }

        // EVENTOS DE LOS FILTROS
        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
                e.target.classList.add('activo');
                aplicarFiltros();
            });
        });

        document.getElementById('filtro-grosor').addEventListener('change', aplicarFiltros);
        document.getElementById('filtro-precio').addEventListener('change', aplicarFiltros);

        // Iniciar
        cargarDatos();
    </script>
</body>
</html>

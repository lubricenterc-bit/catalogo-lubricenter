<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lubricenter | Catálogo</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF5D15">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="logo.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .filtro-btn.activo { background-color: #FF5D15; color: white; border-color: #FF5D15; font-weight: bold; }
        
        /* Animación para el carrito */
        #cart-sidebar { transition: transform 0.3s ease-in-out; }
        .cart-open { transform: translateX(0) !important; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="sticky top-0 z-50 bg-[#0a0a0a]/95 backdrop-blur-md border-b border-white/5 p-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="h-10 w-auto object-contain" onerror="this.style.display='none'">
                <div>
                    <h1 class="text-xl font-black italic tracking-tighter uppercase">Lubricenter<span class="text-[#FF5D15]">.</span></h1>
                </div>
            </div>
            <button onclick="toggleCart()" class="relative bg-white/5 p-2.5 rounded-xl border border-white/10">
                <svg class="h-6 w-6 text-[#FF5D15]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black h-5 w-5 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </header>

    <section class="max-w-7xl mx-auto p-4 md:px-6 sticky top-[73px] z-40 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-white/5">
        <div class="mb-4">
            <input type="text" id="buscador" oninput="aplicarFiltros()" placeholder="Buscar aceite, marca o grosor..." 
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#FF5D15] transition-colors">
        </div>

        <div class="flex gap-2 overflow-x-auto hide-scroll pb-2 mb-3" id="filtro-tipo">
            <button class="filtro-btn activo border border-white/10 text-gray-400 px-4 py-1.5 rounded-full text-[10px] uppercase tracking-wider whitespace-nowrap" data-tipo="todos">Todos</button>
            <button class="filtro-btn border border-white/10 text-gray-400 px-4 py-1.5 rounded-full text-[10px] uppercase tracking-wider whitespace-nowrap" data-tipo="sintetico">Sintético</button>
            <button class="filtro-btn border border-white/10 text-gray-400 px-4 py-1.5 rounded-full text-[10px] uppercase tracking-wider whitespace-nowrap" data-tipo="semi">Semi</button>
            <button class="filtro-btn border border-white/10 text-gray-400 px-4 py-1.5 rounded-full text-[10px] uppercase tracking-wider whitespace-nowrap" data-tipo="mineral">Mineral</button>
        </div>
    </section>

    <main id="grid-productos" class="max-w-7xl mx-auto p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        </main>

    <aside id="cart-sidebar" class="fixed top-0 right-0 bottom-0 w-full md:w-96 bg-[#0f0f0f] z-[60] shadow-2xl translate-x-full flex flex-col border-l border-white/10">
        <div class="p-6 border-b border-white/10 flex items-center justify-between">
            <h2 class="text-xl font-black italic">TU PEDIDO</h2>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-white text-sm font-bold">CERRAR</button>
        </div>
        
        <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4">
            </div>

        <div class="p-6 bg-black/40 border-t border-white/10 space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-gray-400 text-xs font-bold uppercase">Total Estimado</span>
                <div class="text-right">
                    <p id="total-usd" class="text-2xl font-black text-[#FF5D15]">$0.00</p>
                    <p id="total-bs" class="text-xs text-gray-500 font-mono">Bs. 0,00</p>
                </div>
            </div>
            <button onclick="enviarPedido()" class="w-full bg-[#FF5D15] text-white py-4 rounded-xl font-black uppercase tracking-widest hover:brightness-110 transition-all">
                Enviar a WhatsApp
            </button>
        </div>
    </aside>

    <script>
        let inventario = [];
        let carrito = [];

        async function cargarInventario() {
            try {
                const ts = new Date().getTime();
                const res = await fetch(`datos.json?v=${ts}`);
                const data = await res.json();
                inventario = data.productos;
                renderizar(inventario);
            } catch (e) { console.error("Error cargando data"); }
        }

        function renderizar(prods) {
            const container = document.getElementById('grid-productos');
            container.innerHTML = prods.map(p => `
                <div class="glass-card rounded-2xl p-4 flex flex-col h-full">
                    <div class="h-44 bg-black/40 rounded-xl overflow-hidden mb-4 border border-white/5 relative">
                        <img src="${p.imagen}" class="w-full h-full object-cover opacity-80" onerror="this.src='https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=400&auto=format&fit=crop'">
                        <span class="absolute top-2 right-2 bg-black/60 backdrop-blur-md text-[8px] text-white px-2 py-1 rounded font-bold uppercase tracking-widest border border-white/10">${p.categoria}</span>
                    </div>
                    <div class="flex-grow">
                        <h3 class="text-sm font-bold text-gray-200 leading-tight mb-2">${p.nombre}</h3>
                        <p class="text-[10px] text-gray-500 line-clamp-2 mb-4 italic">${p.descripcion}</p>
                    </div>
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <span class="text-[8px] text-gray-500 uppercase block">Ref USD</span>
                            <span class="text-lg font-black text-white">${p.precio_usd_bcv}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-[8px] text-[#FF5D15] uppercase block">Bolívares</span>
                            <span class="text-xs font-bold text-gray-400">Bs. ${p.precio_bs.toLocaleString('es-VE')}</span>
                        </div>
                    </div>
                    <button onclick="agregarAlCarrito('${p.nombre}')" class="w-full bg-white/5 border border-white/10 hover:border-[#FF5D15] hover:bg-[#FF5D15] text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                        Agregar al pedido
                    </button>
                </div>
            `).join('');
        }

        function aplicarFiltros() {
            const texto = document.getElementById('buscador').value.toUpperCase();
            const tipo = document.querySelector('.filtro-btn.activo').dataset.tipo;

            let filtrados = inventario.filter(p => {
                const matchTexto = (p.nombre + p.descripcion + p.categoria).toUpperCase().includes(texto);
                const matchTipo = tipo === 'todos' || (p.nombre + p.categoria).toUpperCase().includes(tipo.toUpperCase());
                return matchTexto && matchTipo;
            });

            renderizar(filtrados);
        }

        function agregarAlCarrito(nombre) {
            const prod = inventario.find(p => p.nombre === nombre);
            const existe = carrito.find(item => item.nombre === nombre);
            if(existe) { existe.cantidad++; } else { carrito.push({...prod, cantidad: 1}); }
            actualizarUI();
        }

        function actualizarUI() {
            document.getElementById('cart-count').innerText = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            
            const totalUSD = carrito.reduce((acc, item) => {
                const precio = parseFloat(item.precio_usd_bcv.replace(/[^0-9.-]+/g,""));
                return acc + (precio * item.cantidad);
            }, 0);

            const totalBS = carrito.reduce((acc, item) => acc + (item.precio_bs * item.cantidad), 0);

            document.getElementById('total-usd').innerText = `$${totalUSD.toFixed(2)}`;
            document.getElementById('total-bs').innerText = `Bs. ${totalBS.toLocaleString('es-VE')}`;

            document.getElementById('cart-items').innerHTML = carrito.map(item => `
                <div class="flex items-center justify-between border-b border-white/5 pb-3">
                    <div class="max-w-[180px]">
                        <p class="text-[10px] font-bold text-white leading-tight">${item.nombre}</p>
                        <p class="text-[9px] text-[#FF5D15] font-bold">${item.cantidad} x ${item.precio_usd_bcv}</p>
                    </div>
                    <button onclick="eliminarDelCarrito('${item.nombre}')" class="text-red-500 text-[10px] font-bold">Quitar</button>
                </div>
            `).join('');
        }

        function eliminarDelCarrito(nombre) {
            carrito = carrito.filter(i => i.nombre !== nombre);
            actualizarUI();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('cart-open'); }

        function enviarPedido() {
            if(carrito.length === 0) return alert("Tu carrito está vacío");
            
            let msg = "¡Hola Lubricenter! Me gustaría pedir:\n\n";
            carrito.forEach(i => { msg += `• ${i.cantidad} x ${i.nombre}\n`; });
            msg += `\n💰 *Total Estimado:* ${document.getElementById('total-usd').innerText}`;
            msg += `\n💵 *En Bolívares:* ${document.getElementById('total-bs').innerText}`;
            
            window.open(`https://wa.me/584147934291?text=${encodeURIComponent(msg)}`);
        }

        // Eventos filtros
        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
                e.target.classList.add('activo');
                aplicarFiltros();
            });
        });

        // PWA Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('PWA OK')).catch(err => console.log('PWA Error', err));
            });
        }

        cargarInventario();
    </script>
</body>
</html>

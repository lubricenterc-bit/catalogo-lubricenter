<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario para talleres afiliados | Lubricenter Cabudare</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Inter', sans-serif; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .glass-card:hover { border-color: rgba(255, 93, 21, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">
    
    <header class="max-w-7xl mx-auto w-full mb-10 flex flex-col md:flex-row justify-between md:items-start border-b border-white/10 pb-6 gap-6 md:gap-4">
        <div class="flex items-start gap-4">
            <img src="logo.png" alt="Lubricenter Cabudare Logo" class="h-16 w-auto">
            
            <div>
                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Inventario para talleres afiliados</p>
                <p class="text-sm font-light italic text-gray-400 mt-1">Cuidamos lo que te mueve</p>
                
                <div class="flex gap-4 mt-3 text-xs font-medium text-gray-400">
                    <a href="https://instagram.com/lubricentercabudare" target="_blank" class="hover:text-[#FF5d15] flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.919-.058-1.265-.069-1.645-.069-4.849 0-3.204.012-3.584.069-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.791-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.209-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                        instagram.com/lubricentercabudare
                    </a>
                    <span class="text-gray-700">|</span>
                    <a href="https://wa.me/584147934291" target="_blank" class="hover:text-[#FF5d15] flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.149-.174.198-.297.297-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>
                        04147934291
                    </a>
                </div>
            </div>
        </div>
        
        <div id="fecha-actualizacion" class="text-[10px] text-gray-400 font-mono text-right md:pt-1">
            Cargando datos...
        </div>
    </header>

    <main id="grid-productos" class="max-w-7xl mx-auto w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 flex-grow">
        </main>

    <footer class="max-w-7xl mx-auto w-full mt-16 pt-6 border-t border-white/10 text-center">
        <p class="text-[10px] text-gray-600 uppercase tracking-wider">LUBRICENTER CABUDARE RIF: J-XXXXXXXX-X | © 2026. Todos los derechos reservados.</p>
    </footer>

    <script>
        async function cargarDatos() {
            try {
                const respuesta = await fetch('datos.json');
                const data = await respuesta.json();
                
                document.getElementById('fecha-actualizacion').innerText = "Actualizado: " + (data.actualizado || 'Recientemente');
                
                const contenedor = document.getElementById('grid-productos');
                contenedor.innerHTML = data.productos.map(p => {
                    
                    const mensajeWa = `Buen dia, me gustaria pedir este producto! ${p.nombre}`;
                    // Mantenemos tu número de whatsapp para el pedido directo
                    const linkWhatsApp = `https://wa.me/584147934291?text=${encodeURIComponent(mensajeWa)}`;
                    
                    return `
                    <div class="glass-card rounded-xl overflow-hidden transition-all duration-300 flex flex-col">
                        <div class="h-40 bg-black/50 relative">
                            <img src="${p.imagen}" alt="${p.nombre}" class="w-full h-full object-cover opacity-80" onerror="this.src='https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=400&auto=format&fit=crop'">
                            <span class="absolute top-2 right-2 bg-black/80 text-white text-[9px] px-2 py-1 rounded font-bold uppercase tracking-wider border border-white/10">${p.categoria}</span>
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h2 class="text-sm font-bold leading-tight mb-2 h-10 overflow-hidden">${p.nombre}</h2>
                            <p class="text-[10px] text-gray-500 mb-4 h-8 overflow-hidden">${p.descripcion}</p>
                            
                            <div class="flex justify-between items-end pt-3 border-t border-white/10 mb-5">
                                <div>
                                    <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Precio Bs</p>
                                    <p class="text-lg font-black text-white">Bs. ${p.precio_bs.toLocaleString('es-VE')}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Ref USD (BCV)</p>
                                    <p class="text-sm font-bold text-[#FF5d15]">${p.precio_usd_bcv}</p>
                                </div>
                            </div>
                            
                            <a href="${linkWhatsApp}" target="_blank" class="mt-auto block w-full bg-[#FF5d15]/10 hover:bg-[#FF5d15] text-[#FF5d15] hover:text-white border border-[#FF5d15]/50 hover:border-[#FF5d15] transition-colors py-2 rounded text-center text-[10px] font-bold uppercase tracking-wider">
                                Pedir por WhatsApp
                            </a>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (error) {
                document.getElementById('grid-productos').innerHTML = '<p class="text-red-500 text-sm">Error cargando el inventario...</p>';
            }
        }

        cargarDatos();
    </script>
</body>
</html>

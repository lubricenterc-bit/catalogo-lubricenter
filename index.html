<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Lubricenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Efecto de 'vidrio' para las tarjetas */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        /* Brillo naranja al pasar el mouse (en PC) */
        .glass-card:hover { border-color: rgba(255, 93, 21, 0.5); transform: translateY(-3px); }
        /* Ocultar barra de desplazamiento */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-20"> <header class="sticky top-0 z-50 bg-[#0a0a0a]/90 backdrop-blur-sm border-b border-white/5 p-4 md:p-6">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://lh3.googleusercontent.com/pw/AP1GczODWkK7C2Lh-fP2zH04A27Vw-Fv4vYn93MhA05uH-JvO7u2bO7J" alt="Logo LC" class="h-10 w-auto">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter">LUBRICENTER<span class="text-[#FF5D15]">.</span></h1>
                    <p class="text-[11px] text-[#FF5D15] font-bold uppercase tracking-widest -mt-1">Cuidamos lo que te mueve</p>
                </div>
            </div>
            <div id="fecha-actualizacion" class="hidden md:block text-[10px] text-gray-500 font-mono text-right">
                Cargando datos...
            </div>
        </div>
    </header>

    <div class="p-4 md:px-6 max-w-7xl mx-auto mt-4">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-white/5 pb-4">
            <div>
                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Inventario para Talleres Afiliados</p>
                <div id="fecha-actualizacion-movil" class="block md:hidden text-[10px] text-gray-600 font-mono mt-1">
                    Actualizando...
                </div>
            </div>
            <div class="flex items-center gap-4 text-gray-400 text-xs">
                <a href="https://www.instagram.com/lubricentercabudare/" target="_blank" class="flex items-center gap-1.5 hover:text-white transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 16V6c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2zm16 0V6a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2zM5 8h14M8 21h8"/></svg>
                    @lubricentercabudare
                </a>
                <a href="https://wa.me/584147934291?text=Buen%20dia,%20me%20gustaria%20consultar%20sobre%20el%20inventario%20para%20talleres" target="_blank" class="flex items-center gap-1.5 hover:text-white transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/></svg>
                    04147934291
                </a>
            </div>
        </div>
    </div>

    <main id="grid-productos" class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
        <p class="text-gray-600 text-sm col-span-full text-center py-10">Cargando inventario...</p>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-[#0a0a0a] border-t border-white/5 p-3 md:hidden">
        <div class="flex items-center justify-around text-gray-500">
            <button class="flex flex-col items-center gap-1 text-[#FF5D15]">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wider">Catálogo</span>
            </button>
            </div>
    </nav>

    <footer class="hidden md:block max-w-7xl mx-auto mt-10 p-6 border-t border-white/5 text-center text-xs text-gray-700">
        <p>LUBRICENTER. © 2026. Todos los derechos reservados. | Cuidamos lo que te mueve.</p>
    </footer>

    <script>
        async function cargarDatos() {
            try {
                // Leemos el archivo datos.json (donde n8n sube la data real)
                const respuesta = await fetch('datos.json');
                const data = await respuesta.json();
                
                // Actualizamos las fechas de actualización en PC y Móvil
                const fechaTexto = "Actualizado: " + (data.actualizado || 'Recientemente');
                document.getElementById('fecha-actualizacion').innerText = fechaTexto;
                document.getElementById('fecha-actualizacion-movil').innerText = fechaTexto;
                
                // Limpiamos y preparamos el contenedor del grid
                const contenedor = document.getElementById('grid-productos');
                contenedor.innerHTML = '';
                
                // Iteramos sobre cada producto y creamos su tarjeta
                data.productos.forEach(p => {
                    
                    // Creamos el link dinámico para WhatsApp con el nombre del producto específico
                    const mensajeWa = `Buen dia, me gustaria pedir este producto! ${p.nombre}`;
                    const linkWhatsApp = `https://wa.me/584147934291?text=${encodeURIComponent(mensajeWa)}`;
                    
                    // Definimos la estructura HTML de la tarjeta del producto
                    const tarjetaHTML = `
                    <div class="glass-card rounded-2xl overflow-hidden transition-all duration-300 flex flex-col p-4">
                        <div class="h-44 bg-black/50 relative rounded-xl overflow-hidden mb-4">
                            <img src="${p.imagen}" alt="${p.nombre}" class="w-full h-full object-cover opacity-80" onerror="this.src='https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=400&auto=format&fit=crop'">
                            <span class="absolute top-3 right-3 bg-[#FF5D15] text-white text-[9px] px-2.5 py-1.5 rounded-lg font-bold uppercase tracking-wider">${p.categoria}</span>
                        </div>
                        <div class="flex-grow flex flex-col">
                            <h2 class="text-sm font-bold leading-snug text-[#f5f5f5] mb-2 h-10 overflow-hidden line-clamp-2">${p.nombre}</h2>
                            <p class="text-[10px] text-gray-500 mb-4 h-8 overflow-hidden line-clamp-2">${p.descripcion}</p>
                            
                            <div class="flex justify-between items-end pt-3 border-t border-white/5 mb-5 mt-auto">
                                <div>
                                    <p class="text-[9px] text-gray-600 uppercase tracking-wider mb-1">Precio Bs</p>
                                    <p class="text-xl font-black text-white">Bs. ${p.precio_bs.toLocaleString('es-VE')}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] text-gray-600 uppercase tracking-wider mb-1">Ref USD (BCV)</p>
                                    <p class="text-sm font-bold text-[#FF5D15]">${p.precio_usd_bcv}</p>
                                </div>
                            </div>
                            
                            <a href="${linkWhatsApp}" target="_blank" class="mt-auto block w-full bg-[#FF5D15] hover:bg-[#FF5D15]/80 text-white transition-colors py-3 rounded-xl text-center text-[10px] font-bold uppercase tracking-wider shadow-lg shadow-[#FF5D15]/10">
                                Pedir por WhatsApp
                            </a>
                        </div>
                    </div>
                    `;
                    
                    // Insertamos la tarjeta en el grid
                    contenedor.insertAdjacentHTML('beforeend', tarjetaHTML);
                });
            } catch (error) {
                // Manejo de errores si el JSON no carga
                document.getElementById('grid-productos').innerHTML = '<p class="text-red-500 text-sm col-span-full text-center py-10">Error cargando el inventario... Esperando sincronización.</p>';
                console.error("Error cargando productos:", error);
            }
        }

        // Ejecutamos la función al cargar la página
        cargarDatos();
    </script>
</body>
</html>
